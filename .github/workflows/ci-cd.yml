# Neo4j Knowledge Graph MCP - CI and npm Publishing
# Runs lint/format/typecheck/test/build on all pushes, publishes to npm on version tags (v*)

name: Neo4j Knowledge Graph MCP CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Gitleaks & Lint-Format-Typecheck-Test-Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      neo4j:
        image: neo4j:2025.03.0-enterprise
        env:
          NEO4J_AUTH: neo4j/memento_password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: yes
          NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -O - http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Build project
        run: pnpm run build

      - name: Create mock .env file for tests
        run: |
          echo "# Mock environment for CI testing" >> .env
          echo "OPENAI_API_KEY=sk-mock-api-key-for-tests" >> .env
          echo "OPENAI_EMBEDDING_MODEL=text-embedding-3-small" >> .env
          echo "MOCK_EMBEDDINGS=true" >> .env
          echo "ENV_FILE_CREATED=true" >> .env

      - name: Initialize Neo4j Schema
        run: pnpm run neo4j:init
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: memento_password
          NEO4J_DATABASE: neo4j
          NEO4J_VECTOR_INDEX: entity_embeddings
          NEO4J_VECTOR_DIMENSIONS: 1536
          NEO4J_SIMILARITY_FUNCTION: cosine

      - name: Run tests
        run: pnpm test
        env:
          MEMORY_STORAGE_TYPE: neo4j
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: memento_password
          NEO4J_DATABASE: neo4j
          NEO4J_VECTOR_INDEX: entity_embeddings
          NEO4J_VECTOR_DIMENSIONS: 1536
          NEO4J_SIMILARITY_FUNCTION: cosine
          OPENAI_API_KEY: sk-mock-api-key-for-tests
          OPENAI_EMBEDDING_MODEL: text-embedding-3-small
          MOCK_EMBEDDINGS: true

  publish:
    name: Publish to npm
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm install

      - name: Build package
        run: npm run build

      - name: Set executable permissions
        run: chmod +x dist/*.js

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Tag version: $TAG_VERSION"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Package.json version: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Tag version matches package.json version"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
