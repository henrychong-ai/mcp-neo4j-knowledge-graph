# Neo4j Knowledge Graph MCP - CI and npm Publishing
# Runs lint/format/typecheck/test/build on all pushes; publishes to npm only on
# version tags (v*) whose commit is on main (see the tag-on-main gate below).

name: Neo4j Knowledge Graph MCP CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Gitleaks & Lint-Format-Typecheck-Test-Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      neo4j:
        image: neo4j:2025.03.0-enterprise
        env:
          NEO4J_AUTH: neo4j/memento_password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: yes
          NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -O - http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Build project
        run: pnpm run build

      - name: Create mock .env file for tests
        run: |
          echo "# Mock environment for CI testing" >> .env
          echo "OPENAI_API_KEY=sk-mock-api-key-for-tests" >> .env
          echo "OPENAI_EMBEDDING_MODEL=text-embedding-3-small" >> .env
          echo "MOCK_EMBEDDINGS=true" >> .env
          echo "ENV_FILE_CREATED=true" >> .env

      - name: Initialize Neo4j Schema
        run: pnpm run neo4j:init
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: memento_password
          NEO4J_DATABASE: neo4j
          NEO4J_VECTOR_INDEX: entity_embeddings
          NEO4J_VECTOR_DIMENSIONS: 1536
          NEO4J_SIMILARITY_FUNCTION: cosine

      - name: Run tests
        run: pnpm test
        env:
          MEMORY_STORAGE_TYPE: neo4j
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: memento_password
          NEO4J_DATABASE: neo4j
          NEO4J_VECTOR_INDEX: entity_embeddings
          NEO4J_VECTOR_DIMENSIONS: 1536
          NEO4J_SIMILARITY_FUNCTION: cosine
          OPENAI_API_KEY: sk-mock-api-key-for-tests
          OPENAI_EMBEDDING_MODEL: text-embedding-3-small
          MOCK_EMBEDDINGS: true

  # Gate: a v* tag publishes ONLY when its commit is on main. Tags are
  # branch-independent, so without this an off-main tag (e.g. pushed from
  # develop) would publish to npm. This job resolves the tagged commit's
  # membership in main and the publish job is gated on its result.
  tag-on-main:
    name: Tag is on main
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tagged commit is on main
        id: check
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "✅ Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is on main — publish allowed."
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${GITHUB_REF_NAME} is not on main — npm publish skipped."
          fi

  publish:
    name: Publish to npm
    needs: [build, tag-on-main]
    # Publish ONLY on a version tag whose commit is on main (both conditions).
    if: ${{ startsWith(github.ref, 'refs/tags/v') && needs.tag-on-main.outputs.on_main == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 24.x
        # Deliberately NO `cache: 'pnpm'` — this job has `id-token: write` (OIDC for npm publish).
        # A poisoned shared dependency cache from a lower-trust context (fork/PR workflows) could
        # execute install-time scripts under elevated privileges, enabling OIDC-token theft and a
        # malicious npm publish. ~30s slower install per tag push; worth it.
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # --ignore-scripts: defence in depth against malicious lifecycle scripts; the explicit
        # build step below does everything needed to publish.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build package
        run: pnpm build

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) ≠ package.json ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "✅ Tag v${TAG_VERSION} matches package.json"

      - name: Publish to npm (OIDC + SLSA provenance)
        # Authenticates via OIDC (Trusted Publisher configured on npmjs.org for this repo +
        # workflow); no NODE_AUTH_TOKEN secret needed. --provenance produces a Sigstore-signed
        # SLSA build attestation (the "Verified" badge on npmjs.org). Pre-release versions
        # (containing "-") publish under the "next" dist-tag so they don't replace "latest".
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            echo "Pre-release detected: publishing v${VERSION} with --tag next"
            npm publish --access public --provenance --tag next
          else
            echo "Stable release: publishing v${VERSION} with default --tag latest"
            npm publish --access public --provenance
          fi
